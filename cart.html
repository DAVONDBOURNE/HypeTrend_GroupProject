<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - HypeTrends</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <h1>HypeTrends</h1>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="cart.html">Cart</a></li>
            <li><a href="about.html">About</a></li>

    <!-- Cart Content -->
    <div class="cart-container">
        <h2>Your Cart 🛒</h2>

        <!-- Cart items are injected here by displayCart() -->
        <div id="cartItems"></div>

        <!-- Totals are injected here -->
        <div id="total"></div>

        <!-- Action buttons -->
        <div class="cart-actions">
            <a href="products.html"><button>← Continue Shopping</button></a>
            <button class="btn-danger" onclick="clearCart()">Clear Cart</button>
            <a href="checkout.html"><button>Checkout →</button></a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
