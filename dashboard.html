<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - HypeTrends</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <h1>HypeTrends</h1>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="cart.html">Cart</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="register.html">Register</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
        </ul>
    </nav>

    <!-- Dashboard -->
    <div id="dashboardContent" class="dashboard-container">

        <h2 class="page-title">📊 Analytics Dashboard</h2>

        <!-- Section 1: User Order Frequency Chart -->
        <div class="dashboard-section">
            <h3>👥 User Order Frequency</h3>
            <p style="color:#94a3b8; font-size:0.85rem; margin-bottom:14px;">
                Shows how many orders each customer has placed.
            </p>
            <!-- Bar chart is built here by showUserFrequency() -->
            <div id="frequencyChart"></div>
        </div>

        <!-- Section 2: My Invoices (for logged in user) -->
        <div class="dashboard-section">
            <h3>🧾 My Orders</h3>
            <p style="color:#94a3b8; font-size:0.85rem; margin-bottom:14px;">
                Your personal order history.
            </p>
            <!-- Filtered invoice table loaded by getUserInvoices() -->
            <div id="myInvoicesTable"></div>
        </div>

        <!-- Section 3: All Invoices Table -->
        <div class="dashboard-section">
            <h3>📋 All Invoices</h3>
            <p style="color:#94a3b8; font-size:0.85rem; margin-bottom:14px;">
                Complete list of all orders placed through the store.
            </p>
            <!-- Full invoice table loaded by showInvoices() -->
            <div id="invoiceTable"></div>
        </div>

    </div>

    <script src="script.js"></script>

    <!-- Call getUserInvoices after page loads -->
    <script>
        // Run getUserInvoices after DOM is ready
        document.addEventListener("DOMContentLoaded", function () {
            getUserInvoices();
        });
    </script>

</body>
</html>
