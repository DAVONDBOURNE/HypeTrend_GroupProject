<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - HypeTrends</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <h1>HypeTrends</h1>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="cart.html">Cart</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="register.html">Register</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
        </ul>
    </nav>

    <div class="form-container">
        <h2>Reset Password</h2>

        <form id="resetPasswordForm">
            <label for="resetTrn">TRN (9 digits)</label>
            <input type="text" id="resetTrn" placeholder="Enter your registered TRN" maxlength="9" required>

            <label for="newPassword">New Password</label>
            <input type="password" id="newPassword" placeholder="Enter a new password" required>

            <label for="confirmNewPassword">Confirm New Password</label>
            <input type="password" id="confirmNewPassword" placeholder="Re-enter your new password" required>

            <div class="form-actions">
                <button type="submit">Update Password</button>
                <button type="button" id="resetPasswordCancel" class="btn-secondary">Cancel</button>
            </div>
        </form>

        <p id="resetPasswordMessage" class="message"></p>

        <p style="text-align:center; margin-top:12px; font-size:0.9rem;">
            Back to <a href="login.html" style="color:var(--accent)">Login</a>
        </p>
    </div>

    <script src="script.js"></script>
</body>
</html>
