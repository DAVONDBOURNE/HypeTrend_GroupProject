<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - HypeTrends</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <h1>HypeTrends</h1>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="cart.html">Cart</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="register.html">Register</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
        </ul>
    </nav>

    <!-- Registration Form -->
    <div class="form-container">
        <h2>Create Account</h2>

        <form id="registerForm">

            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" placeholder="e.g. John Doe">

            <label for="dob">Date of Birth (must be 18+)</label>
            <input type="date" id="dob">

            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="e.g. john@email.com">

            <!-- TRN replaces username as per assignment requirements -->
            <label for="trn">TRN (9 digits, no dashes)</label>
            <input type="text" id="trn" placeholder="e.g. 123456789" maxlength="9">

            <label for="password">Password (min. 8 characters)</label>
            <input type="password" id="password" placeholder="Enter password">

            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" placeholder="Re-enter password">

            <button type="submit">Register</button>

        </form>

        <!-- Message shows here (red or green) -->
        <p id="registerMessage" class="message"></p>

        <p style="text-align:center; margin-top:12px; font-size:0.9rem;">
            Already have an account? <a href="login.html" style="color:var(--accent)">Login here</a>
        </p>
    </div>

    <script src="script.js"></script>
</body>
</html>
