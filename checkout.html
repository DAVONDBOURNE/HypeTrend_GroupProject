<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - HypeTrends</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <h1>HypeTrends</h1>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="cart.html">Cart</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="register.html">Register</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
        </ul>
    </nav>

    <!-- Checkout Content -->
    <div class="checkout-container">
        <h1 class="page-title">Checkout</h1>

        <!-- Order summary loaded by loadCheckout() -->
        <h3 style="color:var(--accent); text-align:left; margin-bottom:8px;">Order Summary</h3>
        <div id="summary" class="checkout-summary"></div>

        <!-- Shipping Details Form -->
        <div class="form-container" style="margin-top:20px;">
            <h2>Shipping Details</h2>

            <!-- onsubmit calls confirmOrder() in script.js -->
            <form onsubmit="return confirmOrder()">

                <label for="shipName">Full Name</label>
                <input type="text" id="shipName" placeholder="Enter your full name">

                <label for="shipAddress">Delivery Address</label>
                <input type="text" id="shipAddress" placeholder="e.g. 123 Main St, Kingston">

                <label for="amountPaid">Amount You're Paying ($)</label>
                <input type="number" id="amountPaid" placeholder="Enter amount" min="0" step="0.01">

                <!-- Error message shown if validation fails -->
                <p id="checkoutError" class="message"></p>

                <button type="submit">Confirm Order ✅</button>

            </form>
        </div>

        <div style="text-align:center; margin-top:15px;">
            <a href="cart.html"><button>← Back to Cart</button></a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
